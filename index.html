<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login View -->
    <div id="login-view" class="login-container">
        <div class="login-card">
            <h1 class="logo" style="color: #1a1a1a;">GALLERY</h1>
            <p>Welcome. Please log in to your secure local workspace.</p>
            <form id="login-form" autocomplete="off">
                <input type="text" id="login-name" placeholder="Full Name" required autocomplete="off">
                <div style="position: relative; width: 100%; margin-bottom: 15px;">
                    <input type="password" id="login-password" placeholder="Password" required style="margin-bottom: 0;" autocomplete="new-password">
                    <span id="toggle-password" style="position: absolute; right: 15px; top: 14px; cursor: pointer; color: #666; font-size: 16px; user-select: none;">👁️</span>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <p class="login-info">
                Your credentials are securely stored on your local system only.<br>
                <a href="#" id="reset-workspace" style="color: #1a1a1a; text-decoration: underline; font-weight: 600; display: inline-block; margin-top: 8px;">Reset Workspace</a>
            </p>
        </div>
    </div>

    <!-- Main App View -->
    <div class="app-container" id="main-app-view" style="display: none;">
        <aside class="thumbnail-sidebar">
            <div class="sidebar-header">
                <h1 class="logo">GALLERY</h1>
                <!-- User Profile & Storage Info -->
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">?</div>
                    <div class="user-details">
                        <span id="user-name-display">User</span>
                        <span class="storage-info">1 GB Local Storage Available</span>
                    </div>
                    <button id="logout-btn" class="icon-btn" style="padding: 4px 8px; font-size: 12px; margin-left: auto;">Logout</button>
                </div>
            </div>
            <div class="category-filters">
                <button class="cat-btn active" data-cat="random">Normal</button>
                <button class="cat-btn" data-cat="grayscale">Grayscale</button>
                <button class="cat-btn" data-cat="blur">Blurred</button>
                <button class="cat-btn" data-cat="specific">Specific Size</button>
            </div>
            <div class="thumbnail-grid" id="thumbnail-grid">
                <!-- 10 thumbnails injected by JS -->
            </div>
            <div class="loader" id="loader">Loading...</div>
        </aside>
        
        <main class="main-content">
            <div class="large-image-container" id="large-image-container">
                <img id="main-image" src="" alt="Main View" style="opacity: 0;">
            </div>
            <div class="info-bar" style="display: flex; justify-content: space-between; align-items: center;">
                <p id="image-url">Fetching images...</p>
                <div class="zoom-controls" style="display: flex; gap: 10px;">
                    <button id="zoom-out" class="icon-btn">Zoom Out (-)</button>
                    <button id="zoom-in" class="icon-btn">Zoom In (+)</button>
                    <button id="enlarge" class="icon-btn">Enlarge</button>
                    <button id="download" class="icon-btn">Download</button>
                </div>
            </div>
            <div class="bottom-controls">
                <button id="prev-btn" class="nav-btn">Previous Image</button>
                <button id="next-btn" class="nav-btn">Next Image</button>
            </div>
        </main>
    </div>

    <!-- Black backdrop for image enhancement (Enlarge) -->
    <div id="lightbox" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center;">
        <button id="lightbox-back" style="position: absolute; top: 30px; left: 30px; padding: 10px 20px; background: #ffffff; color: #000000; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif; transition: transform 0.2s;">&#8592; Go Backward</button>
        <img id="lightbox-img" src="" style="max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px;">
    </div>

    <script src="renderer.js"></script>
</body>
</html>
